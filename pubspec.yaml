name: indivio
description: Indivio Edtech - School & Coaching Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.3

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.3.0

  # UI & Charts
  fl_chart: ^0.68.0
  table_calendar: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # File handling
  file_picker: ^8.1.2
  image_picker: ^1.1.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.6
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true

  assets:
    - assets/mock_db/school.json
    - assets/mock_db/classes.json
    - assets/mock_db/subjects.json
    - assets/mock_db/students.json
    - assets/mock_db/teachers.json
    - assets/mock_db/timetable.json
    - assets/mock_db/attendance.json
    - assets/mock_db/academics.json
    - assets/mock_db/fees_leaves_announcements.json
    - assets/mock_db/materials_syllabus.json
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        # Note: Inter-SemiBold.ttf and Inter-Bold.ttf were not present
        # in assets/fonts. Using available fonts as fallbacks.